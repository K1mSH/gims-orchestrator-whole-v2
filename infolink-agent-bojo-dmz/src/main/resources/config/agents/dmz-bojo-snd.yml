# ── DMZ SND (Send) Agent ──
# DMZ Target DB의 데이터를 IF_SND(송신 인터페이스) 테이블에 적재한다.
# 파이프라인 흐름: Target DB(source) → IF_SND(target)
agent-code: dmz-bojo-snd
type: SND

steps:
  - id: jewon-snd-extract
    name: 제원 데이터 송신 추출
    factory-key: source-to-if
    source-table: sec_jewon
    target-table: if_snd_sec_jewon
    primary-key: id
    conflict-key: source_refs
    full-copy: true

  - id: obsvdata-snd-extract
    name: 관측데이터 송신 추출
    factory-key: source-to-if
    source-table: sec_obsvdata
    target-table: if_snd_sec_obsvdata
    primary-key: id
    conflict-key: source_refs
    date-column: obsv_date
    time-column: obsv_time

retention-candidates:
  - table: if_snd_sec_obsvdata
    dateColumn: obsv_date
    description: DMZ → Internal 송신용 관측 시계열
