services:
  sync-proxy-internal:
    build:
      context: .
      dockerfile: proxy-internal/Dockerfile
    container_name: docker-poc-proxy-internal
    ports:
      - "18093:8093"   # 호스트 18093 → 컨테이너 8093 (호스트 8093 사용 중이라 분리)
    environment:
      JASYPT_PASSWORD: ${JASYPT_PASSWORD}
      # yml ENC 값 안에 박힌 host(localhost)를 컨테이너용으로 override
      SPRING_DATASOURCE_URL: jdbc:oracle:thin:@//host.docker.internal:29004/XEPDB1
      AGENT_ORCHESTRATOR_URL: http://host.docker.internal:8080
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: "no"

  gims-api-provider:
    build:
      context: .
      dockerfile: api-provider/Dockerfile
    container_name: docker-poc-api-provider
    ports:
      - "18095:8095"   # 호스트 18095 → 컨테이너 8095 (호스트 8095 사용 중이라 분리)
    environment:
      JASYPT_PASSWORD: ${JASYPT_PASSWORD}
      # yml ENC 값 안에 박힌 host(localhost)를 컨테이너용으로 override
      SPRING_DATASOURCE_URL: jdbc:postgresql://host.docker.internal:29006/api_provider
      APP_PROXY_URL: http://sync-proxy-internal:8093
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - sync-proxy-internal
    restart: "no"
