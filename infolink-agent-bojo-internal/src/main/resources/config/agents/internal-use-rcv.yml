# ── Internal 이용량 RCV Agent ──
# DMZ Others IF_SND(PG 29001) → 내부망 IF_RSV(Oracle 29004) 적재
# 3개 테이블: 이용량 레거시, 이용량 상태, 제주 일일이용량
agent-code: internal-use-rcv
type: RCV

steps:
  - id: use-legacy-rcv
    name: 이용량 레거시 수신
    factory-key: source-to-if
    source-table: if_snd_use_legacy_data
    target-table: IF_RSV_USE_LEGACY_DATA
    primary-key: sn
    conflict-key: source_refs
    # source(if_snd)의 sn 이 비즈니스 PK — target 에도 보존 (UseLoadStep 이 SN 으로 TM_GD111025 적재)
    exclude-insert-columns: [id]

  - id: use-status-rcv
    name: 이용량 상태 수신
    factory-key: source-to-if
    source-table: if_snd_use_status_data
    target-table: IF_RSV_USE_STATUS_DATA
    primary-key: sn
    conflict-key: source_refs
    exclude-insert-columns: [id]

  - id: use-jejuday-rcv
    name: 제주 일일이용량 수신
    factory-key: source-to-if
    source-table: if_snd_use_jeju_day
    target-table: IF_RSV_USE_JEJU_DAY
    primary-key: id
    conflict-key: source_refs

# Retention 후보 — 이용량 transit (RCV target) 시계열. OBSR_DT(관측시각) / EXTRACTED_AT(시스템 입수) 둘 다 후보 (운영자 선택).
# JEJU_DAY 의 OBSR_DE(varchar YYYYMMDD)는 별 트랙 enhancement 대기 — EXTRACTED_AT 만 후보.
# 정책: dev_plan/2026_05/08/retention-candidates-safety.md, 매트릭스: docs/agent-retention-where.md
retention-candidates:
  - table: IF_RSV_USE_LEGACY_DATA
    dateColumn: OBSR_DT
    description: 이용량 시간자료 RCV (Internal 수신) — 관측시각 기준
  - table: IF_RSV_USE_LEGACY_DATA
    dateColumn: EXTRACTED_AT
    description: 이용량 시간자료 RCV — 시스템 입수 기준
  - table: IF_RSV_USE_STATUS_DATA
    dateColumn: OBSR_DT
    description: 이용량 관측데이터 RCV — 관측시각 기준
  - table: IF_RSV_USE_STATUS_DATA
    dateColumn: EXTRACTED_AT
    description: 이용량 관측데이터 RCV — 시스템 입수 기준
  - table: IF_RSV_USE_JEJU_DAY
    dateColumn: EXTRACTED_AT
    description: 제주 일일이용량 RCV — 시스템 입수 기준 (OBSR_DE varchar 는 별 트랙)
