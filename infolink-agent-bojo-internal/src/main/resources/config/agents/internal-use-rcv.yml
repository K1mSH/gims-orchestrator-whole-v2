# ── Internal 이용량 RCV Agent ──
# DMZ Others IF_SND(PG 29001) → 내부망 IF_RSV(Oracle 29004) 적재
# 3개 테이블: 이용량 레거시, 이용량 상태, 제주 일일이용량
agent-code: internal-use-rcv
type: RCV

steps:
  - id: use-legacy-rcv
    name: 이용량 레거시 수신
    factory-key: source-to-if
    source-table: if_snd_use_legacy_data
    target-table: IF_RSV_USE_LEGACY_DATA
    primary-key: sn
    conflict-key: source_refs
    # source(if_snd)의 sn 이 비즈니스 PK — target 에도 보존 (UseLoadStep 이 SN 으로 TM_GD111025 적재)
    exclude-insert-columns: [id]

  - id: use-status-rcv
    name: 이용량 상태 수신
    factory-key: source-to-if
    source-table: if_snd_use_status_data
    target-table: IF_RSV_USE_STATUS_DATA
    primary-key: sn
    conflict-key: source_refs
    exclude-insert-columns: [id]

  - id: use-jejuday-rcv
    name: 제주 일일이용량 수신
    factory-key: source-to-if
    source-table: if_snd_use_jeju_day
    target-table: IF_RSV_USE_JEJU_DAY
    primary-key: id
    conflict-key: source_refs

# Retention 비대상 — 마스터 / Link / 시설 등록 데이터 (등록 후 영구 보존)
# dev_plan/2026_05/08/retention-candidates-safety.md
retention-candidates: []
