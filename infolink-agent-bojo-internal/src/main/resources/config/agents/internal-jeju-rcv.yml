# ── Internal 제주 RCV Agent ──
# DMZ Others IF_SND(PG 29001) → 내부망 IF_RSV(Oracle 29004) 적재
# 3개 테이블: 관측점 마스터, 수위 관측, 이용실태
agent-code: internal-jeju-rcv
type: RCV

steps:
  - id: jeju-jewon-rcv
    name: 제주 관측점 마스터 수신
    factory-key: source-to-if
    source-table: if_snd_tb_jeju_jewon
    target-table: IF_RSV_TB_JEJU_JEWON
    primary-key: obsrvt_id
    conflict-key: source_refs
    full-copy: true

  - id: jeju-obsv-rcv
    name: 제주 수위 관측 수신
    factory-key: source-to-if
    source-table: if_snd_tb_jeju
    target-table: IF_RSV_TB_JEJU
    primary-key: rid
    conflict-key: source_refs

  - id: jeju-stgms-rcv
    name: 제주 이용실태 수신
    factory-key: source-to-if
    source-table: if_snd_rgetstgms01
    target-table: IF_RSV_RGETSTGMS01
    primary-key: perm_nt_no
    conflict-key: source_refs

# Retention 후보 — 제주 IF_RSV transit 의 우리 메타 시각 기준만.
# 운영 정책: 외부 원본 (비즈니스 컬럼) 은 영구 보존, 우리 시스템 통해 적재된 row 만
# EXTRACTED_AT/UPDATED_AT 기준으로 정리 가능.
# Loader target 은 환경부 표준 GIMS 마스터 + EAV fan-out 이라 메타 컬럼 없음 → 별 yml 비대상.
# 정책: dev_plan/2026_05/08/retention-candidates-safety.md, 매트릭스: docs/agent-retention-where.md
retention-candidates:
  - { table: IF_RSV_TB_JEJU_JEWON, dateColumn: EXTRACTED_AT, description: 제주 관측점 마스터 RCV transit — 시스템 입수 }
  - { table: IF_RSV_TB_JEJU_JEWON, dateColumn: UPDATED_AT,   description: 제주 관측점 마스터 RCV transit — 마지막 변경 }
  - { table: IF_RSV_TB_JEJU,       dateColumn: EXTRACTED_AT, description: 제주 수위 관측 RCV transit — 시스템 입수 }
  - { table: IF_RSV_TB_JEJU,       dateColumn: UPDATED_AT,   description: 제주 수위 관측 RCV transit — 마지막 변경 }
  - { table: IF_RSV_RGETSTGMS01,   dateColumn: EXTRACTED_AT, description: 제주 이용실태 RCV transit — 시스템 입수 }
  - { table: IF_RSV_RGETSTGMS01,   dateColumn: UPDATED_AT,   description: 제주 이용실태 RCV transit — 마지막 변경 }
