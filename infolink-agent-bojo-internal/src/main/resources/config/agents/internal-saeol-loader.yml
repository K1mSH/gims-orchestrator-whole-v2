# ── Internal 새올 Loader Agent ──
# 내부망 IF_RSV(Oracle 29004) → GIMS 타겟(Oracle 29004) 적재
# 단순 카피 (source-to-if), conflict-key=source_refs, 16개 테이블
agent-code: internal-saeol-loader
type: LOADER

steps:
