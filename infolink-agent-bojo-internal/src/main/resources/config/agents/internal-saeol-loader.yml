# Retention 후보 — 새올 마스터 GIMS target 의 우리 메타 시각 기준.
# 운영 정책: 외부 새올 원본 시각(FIRST_REG_DTHR/LAST_MOD_DTHR)은 영구 보존,
# 우리 시스템 통해 적재된 row 만 EXTRACTED_AT/UPDATED_AT 기준으로 정리 가능.
# 정책: dev_plan/2026_05/08/retention-candidates-safety.md, 매트릭스: docs/agent-retention-where.md
retention-candidates:
  - { table: RGETSTGMS01,  dateColumn: EXTRACTED_AT, description: 이용실태 GIMS — 시스템 입수 }
  - { table: RGETSTGMS01,  dateColumn: UPDATED_AT,   description: 이용실태 GIMS — 마지막 변경 }
