# ── Internal Loader Agent ──
# 내부망 IF_RSV 데이터를 GIMS 실테이블에 적재한다.
# 파이프라인의 최종 단계로, 실제 GIMS 시스템에서 사용하는 테이블에 데이터를 반영한다.
# 파이프라인 흐름: IF_RSV(if-table) → GIMS 실테이블(target-table)
agent-code: internal-bojo-loader
type: LOADER

steps:
  - id: internal-bojo-load
    name: 내부망 GIMS 적재
    factory-key: internal-bojo-load
    source-table: IF_RSV_SEC_OBSVDATA
    target-table: [PM_GD970201, TM_GD970101, TM_GD980002]

# Retention 룰: Agent 는 자기 target 만 후보 (이중 설정 방지).
# IF_RSV_SEC_OBSVDATA 는 internal-bojo-rcv 의 target 이라 거기서만 박힘.
retention-candidates:
  - table: PM_GD970201
    dateColumn: OBSRVN_DT
    description: GIMS 관측 시계열 (EAV 1:3 적재)
