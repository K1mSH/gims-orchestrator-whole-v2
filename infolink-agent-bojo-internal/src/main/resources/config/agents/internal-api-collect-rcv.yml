# ── Internal RCV — API Collector 데이터 수신 ──
# DMZ IF_SND(PG) → 내부망 IF_RSV(Oracle) 적재
# Proxy(8093) 경유로 DMZ IF_SND 읽기
agent-code: internal-api-collect-rcv
type: RCV

steps:
  - id: news-rcv
    name: 뉴스 수신
    factory-key: source-to-if
    source-table: if_snd_tm_gd014001
    target-table: if_rsv_tm_gd014001
    primary-key: sn
    conflict-key: source_refs
    full-copy: true
    skip-source-status-update: true

  - id: nara-bid-rcv
    name: 나라장터 수신
    factory-key: source-to-if
    source-table: if_snd_tm_gd014000
    target-table: if_rsv_tm_gd014000
    primary-key: sn
    conflict-key: source_refs
    full-copy: true
    skip-source-status-update: true

# Retention 후보 — api-collector 수집 IF_RSV transit 의 우리 메타 시각 기준만.
# 운영 정책: target(TM_GD014001/014000)은 환경부 표준이라 메타 컬럼 없음 → Loader 비대상.
# 정책: dev_plan/2026_05/08/retention-candidates-safety.md, 매트릭스: docs/agent-retention-where.md
retention-candidates:
  - { table: IF_RSV_TM_GD014001, dateColumn: EXTRACTED_AT, description: 뉴스 RCV transit — 시스템 입수 }
  - { table: IF_RSV_TM_GD014001, dateColumn: UPDATED_AT,   description: 뉴스 RCV transit — 마지막 변경 }
  - { table: IF_RSV_TM_GD014000, dateColumn: EXTRACTED_AT, description: 나라장터 RCV transit — 시스템 입수 }
  - { table: IF_RSV_TM_GD014000, dateColumn: UPDATED_AT,   description: 나라장터 RCV transit — 마지막 변경 }
