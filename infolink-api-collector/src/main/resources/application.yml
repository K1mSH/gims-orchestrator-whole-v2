  datasource:
    url: ENC(hg7lOp9CmODutrzy16m5LCIW2UyuN0F4lprF8kklqqMQyVASUy5KwfPxKqA7DeYUTn2JyP/TYVDnHn7OD3tLezssUgNt7PybvQ8emHR5Yxo=)
    username: ENC(Yvbz0txrJEIoyUw56bhkWX6nYetTyRTxVwVm3gwMLTdzfdLJujRS5Ltq0tcbMQmj)
    password: ENC(qNWBRGoyzgVAlMEkvOE2jAtKJK60ZGjBP3RHzeJVmrt63UkW5C36MqxgtO8pGOoE)
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

# Jasypt 암호화 설정
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:sync-pipeline-secret-key-2024}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Orchestrator 연결 (외부 Datasource 조회용)
orchestrator:
  url: ENC(xnxfkstDgp9riQKlSListH6OelTJ2wApZe1KoKpTflTGSVjEfbji9sEwXDzStFew8wJgPEhKP+yawGahOCubqw==)

# LOOKUP 공통코드 API (GIMS 내부)
lookup:
  common-code-url: http://localhost:8084/mock/common/select/{groupCode}
  api-key-url: http://localhost:8084/mock/api-keys

logging:
  level:
    com.infolink.collector: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:mem:api_collector;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
