server:
  port: 8084

spring:
  application:
    name: infolink-api-collector

  datasource:
    url: ENC(SEmKJET7sHv0FyC7ffxBbGrBe3fIfRiH3tRvEANblHcUC2xkqxtDMdoZRQYV08A9KnIqvILy+9BScibMfL7GgmqSdj8OHssCUPXmLP9PDSo=)
    username: ENC(4WzyGx0RnV47Iqyb7g+Er3qqIII3dhjq2FzDHbDdu966pQ3FKn1XmPm1qt/xpYfe)
    password: ENC(ddLfopc8LeNkYf1Phsfoe3cQGHCyqy2htaGgQ9Yzy2RpBXmM3qEiEtgyUg8Kj5w8)
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: true

# Auth (JWT — auth 모듈 9096 검증자, 운영자 호출용)
auth:
  jwks-url: http://localhost:9096/.well-known/jwks.json
  issuer: orchestrator-auth
  audience: orchestrator

jwt:
  cookie:
    enabled: true

# MockApiController — 개발 의존성 (LOOKUP 자체 호출: lookup.common-code-url=/mock/...).
# 운영에서는 실 GIMS 내부 endpoint 호출로 완전 대체 → 운영 yml 에서 false 로 override.
mock:
  api:
    enabled: true

# Jasypt 암호화 설정
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:sync-pipeline-secret-key-2024}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Agent 공통 설정 — datasource connection-info 는 Proxy 경유 + X-API-Key 로 단일화 (다른 6 모듈과 키 일관)
# 옛 orchestrator.url 직접 호출은 5/18 폐기 (참고: dev_plan/2026_05/18/api-collector-proxy-routing-fix.md)
agent:
  proxy-url: ENC(ZdOrUviyTKn8YvU+Vs725joK12w5RyS01fYyA5p8zN0jPVJVpDxiZjRRQWf3AnkWQQ2R7wKjhM6AScv+OveAaQ==)
  api-key: ENC(YzTJ0UGnUBS+pOEw5EEu7jEp/rRjAANV95og3onvTTuV4bsTdh7jWP/RUx/jv2vTLojWfJ8QltB9oknwS63RXA==)
  zone: DMZ

# LOOKUP 공통코드 API (GIMS 내부)
lookup:
  common-code-url: http://localhost:8084/mock/common/select/{groupCode}
  api-key-url: http://localhost:8084/mock/api-keys

logging:
  level:
    com.infolink.collector: DEBUG
    org.hibernate.SQL: DEBUG

---
spring:
  config:
    activate:
      on-profile: h2

  datasource:
    url: jdbc:h2:mem:api_collector;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console
