server:
  port: 8096

spring:
  application:
    name: infolink-auth

  # Orchestrator PG (29001 / orchestrator DB) — backend 와 동일 ENC 재활용
  datasource:
    url: ENC(BMigUUwEN738yfBUocoMn9furDkBOfQrHx+LnnM7ne2H/1Uwctqe4tFYdWOQ4tRHyGHOh3tc6AqG0foeYINsj/G6O1bLFb/Q5rvv1oMKb7s=)
    username: ENC(EDM5TL2kOyQiRFRd9jESbpEI2D5xiI39lrtus7w21+HokNEBVH//QAudBWulnwkW)
    password: ENC(hqhtiytYUEOFiwvWrzC1/VpX4LSBz9izPItGydeOdcngRI5FUnI3U2wwYLiUEXfB)
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Auth 설정
auth:
  access-token-ttl-minutes: 720    # 12시간
  refresh-token-ttl-days: 7
  rsa:
    key-size: 2048
    rotation-cron: "0 0 0 * * ?"      # 매일 자정
    retention-days: 8                 # 만료 후 폐기 시점
  cookie:
    same-site: Strict
    secure: ${AUTH_COOKIE_SECURE:false}    # 운영=true (HTTPS)
    domain:                                 # 비워두면 요청 host 사용 (개발 편의)
  bcrypt:
    rounds: 12
  issuer: orchestrator-auth
  audience: orchestrator

# Jasypt 암호화 (yml ENC 복호화용)
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:sync-pipeline-secret-key-2024}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.infolink.auth: DEBUG
    org.springframework.security: INFO
