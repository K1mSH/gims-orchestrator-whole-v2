server:
  port: 8085

spring:
  application:
    name: infolink-agent-others-dmz

  # Agent 자체 DB — DMZ PostgreSQL (dev)
  datasource:
    url: ENC(5nfufl87NVC0km6eGdKSO2aaAZ0fpzItQEOSgO2NDo/aE1bbnC6nS7jVmPIc7JENMLKoQkRx3Z1rDGCEpU/21gSIKWOOjK1tCVeub82uPJE=)
    username: ENC(EDM5TL2kOyQiRFRd9jESbpEI2D5xiI39lrtus7w21+HokNEBVH//QAudBWulnwkW)
    password: ENC(hqhtiytYUEOFiwvWrzC1/VpX4LSBz9izPItGydeOdcngRI5FUnI3U2wwYLiUEXfB)
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# common 컨트롤러/필터 활성화
common:
  controller:
    cleanup.enabled: true
    execution-data.enabled: true
    datasource.enabled: true
    execution-params.enabled: true
  filter:
    api-key.enabled: true

# Agent 공통 설정
agent:
  orchestrator-url: ENC(OFVnMq6khLyzmLltDmT5G/bAMDkvZsa9Vm2o8a+aLtyOS63df427nLFCxDL/JjiahkhTBHS+FOALkdpIYMpPLA==)
  proxy-url: ENC(ZdOrUviyTKn8YvU+Vs725joK12w5RyS01fYyA5p8zN0jPVJVpDxiZjRRQWf3AnkWQQ2R7wKjhM6AScv+OveAaQ==)
  api-key: ENC(YzTJ0UGnUBS+pOEw5EEu7jEp/rRjAANV95og3onvTTuV4bsTdh7jWP/RUx/jv2vTLojWfJ8QltB9oknwS63RXA==)
  zone: DMZ
  history-datasource-id: dmz    # sync_log + execution 적재 위치 (= module default JPA primary). 운영자 노출 X.
  debug:
    step-delay-ms: 0
  batch:
    insert-batch-size: 1000

# Jasypt 암호화 설정
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:sync-pipeline-secret-key-2024}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,threaddump,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sync: DEBUG
    org.hibernate.SQL: DEBUG
