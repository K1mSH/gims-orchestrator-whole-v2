# ── DMZ Others SND — 이용량 (3테이블) ──
# 이용량 관련 데이터를 IF_SND 테이블에 적재
# use_legacy_data, use_status_data: link_status 있음 → 증분 동기화
# use_jeju_day: 외부 시스템 적재 테이블 (link_status 추가됨)
agent-code: dmz-others-snd-use
type: SND

steps:
  - id: use-legacy-snd
    name: 이용량 레거시 송신
    factory-key: source-to-if
    source-table: use_legacy_data
    target-table: if_snd_use_legacy_data
    primary-key: sn
    conflict-key: source_refs
    # source 의 sn 이 비즈니스 PK — target 에도 보존되어야 함 (default ["id","sn"] 가 sn 제외하는 거 override)
    exclude-insert-columns: [id]

  - id: use-status-snd
    name: 이용량 상태 송신
    factory-key: source-to-if
    source-table: use_status_data
    target-table: if_snd_use_status_data
    primary-key: sn
    conflict-key: source_refs
    exclude-insert-columns: [id]

  - id: use-jejuday-snd
    name: 제주 일일이용량 송신
    factory-key: source-to-if
    source-table: use_jeju_day
    target-table: if_snd_use_jeju_day
    primary-key: obsrvt_id,obsr_de
    conflict-key: source_refs

# Retention 후보 — 이용량 transit (SND target) 시계열. obsr_dt(관측시각) / extracted_at(시스템 입수) 둘 다 후보 (운영자 선택).
# jeju_day 의 obsr_de(varchar YYYYMMDD)는 별 트랙 enhancement 대기 — extracted_at 만 후보.
# 정책: dev_plan/2026_05/08/retention-candidates-safety.md, 매트릭스: docs/agent-retention-where.md
retention-candidates:
  - table: if_snd_use_legacy_data
    dateColumn: obsr_dt
    description: 이용량 시간자료 SND transit — 관측시각 기준
  - table: if_snd_use_legacy_data
    dateColumn: extracted_at
    description: 이용량 시간자료 SND transit — 시스템 입수 기준
  - table: if_snd_use_status_data
    dateColumn: obsr_dt
    description: 이용량 관측데이터 SND transit — 관측시각 기준
  - table: if_snd_use_status_data
    dateColumn: extracted_at
    description: 이용량 관측데이터 SND transit — 시스템 입수 기준
  - table: if_snd_use_jeju_day
    dateColumn: extracted_at
    description: 제주 일일이용량 SND transit — 시스템 입수 기준 (obsr_de varchar 는 별 트랙)
