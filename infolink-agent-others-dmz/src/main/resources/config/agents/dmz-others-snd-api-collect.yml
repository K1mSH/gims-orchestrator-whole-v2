# ── DMZ Others SND — API Collector 수집 데이터 (2테이블) ──
# api-collector가 수집한 뉴스/나라장터 데이터를 IF_SND 테이블에 적재
# 파이프라인 흐름: api_collector DB(source) → IF_SND(target)
agent-code: dmz-others-snd-api-collect
type: SND

steps:
  - id: news-snd
    name: 뉴스 송신
    factory-key: source-to-if
    source-table: tm_gd014001
    target-table: if_snd_tm_gd014001
    primary-key: sn
    conflict-key: source_refs
    full-copy: true

  - id: nara-bid-snd
    name: 나라장터 송신
    factory-key: source-to-if
    source-table: tm_gd014000
    target-table: if_snd_tm_gd014000
    primary-key: sn
    conflict-key: source_refs
    full-copy: true

# Retention 후보 — api-collector 수집 IF_SND transit 의 우리 메타 시각 기준만.
# 운영 정책: target(TM_GD014001/014000)은 환경부 표준 + 비즈니스 시각 컬럼(varchar)이라 메타 컬럼 없음 → Loader 비대상.
# 정책: dev_plan/2026_05/08/retention-candidates-safety.md, 매트릭스: docs/agent-retention-where.md
retention-candidates:
  - { table: if_snd_tm_gd014001, dateColumn: extracted_at, description: 뉴스 SND transit — 시스템 입수 }
  - { table: if_snd_tm_gd014001, dateColumn: updated_at,   description: 뉴스 SND transit — 마지막 변경 }
  - { table: if_snd_tm_gd014000, dateColumn: extracted_at, description: 나라장터 SND transit — 시스템 입수 }
  - { table: if_snd_tm_gd014000, dateColumn: updated_at,   description: 나라장터 SND transit — 마지막 변경 }
