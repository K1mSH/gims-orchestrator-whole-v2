# ── DMZ Others SND — 제주 (3테이블) ──
# 제주 보조관측 데이터를 IF_SND 테이블에 적재
# 소스 테이블에 link_status 컬럼 있음 → 증분 동기화 가능
agent-code: dmz-others-snd-jeju
type: SND

steps:
  - id: jeju-jewon-snd
    name: 제주 관측점 마스터 송신
    factory-key: source-to-if
    source-table: tb_jeju_jewon
    target-table: if_snd_tb_jeju_jewon
    primary-key: obsrvt_id
    conflict-key: source_refs

  - id: jeju-obsv-snd
    name: 제주 수위 관측 송신
    factory-key: source-to-if
    source-table: tb_jeju
    target-table: if_snd_tb_jeju
    primary-key: rid
    conflict-key: rid

  - id: jeju-stgms-snd
    name: 제주 이용실태 송신
    factory-key: source-to-if
    source-table: rgetstgms01
    target-table: if_snd_rgetstgms01
    primary-key: perm_nt_no
    conflict-key: source_refs

# Retention 후보 — 제주 IF_SND transit 의 우리 메타 시각 기준만.
# 운영 정책: 외부 원본 (비즈니스 컬럼) 은 영구 보존, 우리 시스템 통해 적재된 row 만
# extracted_at/updated_at 기준으로 정리 가능.
# Loader target 은 환경부 표준 GIMS 마스터 + EAV fan-out 이라 메타 컬럼 없음 → 별 yml 비대상.
# 정책: dev_plan/2026_05/08/retention-candidates-safety.md, 매트릭스: docs/agent-retention-where.md
retention-candidates:
  - { table: if_snd_tb_jeju_jewon, dateColumn: extracted_at, description: 제주 관측점 마스터 SND transit — 시스템 입수 }
  - { table: if_snd_tb_jeju_jewon, dateColumn: updated_at,   description: 제주 관측점 마스터 SND transit — 마지막 변경 }
  - { table: if_snd_tb_jeju,       dateColumn: extracted_at, description: 제주 수위 관측 SND transit — 시스템 입수 }
  - { table: if_snd_tb_jeju,       dateColumn: updated_at,   description: 제주 수위 관측 SND transit — 마지막 변경 }
  - { table: if_snd_rgetstgms01,   dateColumn: extracted_at, description: 제주 이용실태 SND transit — 시스템 입수 }
  - { table: if_snd_rgetstgms01,   dateColumn: updated_at,   description: 제주 이용실태 SND transit — 마지막 변경 }
