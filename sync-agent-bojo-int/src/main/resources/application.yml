server:
  port: 8092

spring:
  application:
    name: sync-agent-bojo-int

  # Agent 자체 DB (로그, 실행 기록 저장용) - 내부망 PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:29002/dev
    username: k1m
    password: 1111
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# Agent 공통 설정
agent:
  orchestrator-url: http://localhost:8080
  zone: INTERNAL
  debug:
    step-delay-ms: 0
  batch:
    insert-batch-size: 1000

# Jasypt 암호화 설정
jasypt:
  encryptor:
    password: ${JASYPT_PASSWORD:sync-pipeline-secret-key-2024}
    algorithm: PBEWithHMACSHA512AndAES_256
    iv-generator-classname: org.jasypt.iv.RandomIvGenerator

# Actuator 모니터링
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,threaddump,env
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.sync: DEBUG
    org.hibernate.SQL: DEBUG
