# ── Internal Loader Agent ──
# 내부망 IF_RSV 데이터를 GIMS 실테이블에 적재한다.
# 파이프라인의 최종 단계로, 실제 GIMS 시스템에서 사용하는 테이블에 데이터를 반영한다.
# 파이프라인 흐름: IF_RSV(if-table) → GIMS 실테이블(target-table)
agent-code: internal-bojo-loader
type: LOADER

steps:
  - id: internal-bojo-load
    name: 내부망 GIMS 적재
    factory-key: internal-bojo-load

select-tables:
  - IF_RSV_SEC_JEWON
  - IF_RSV_SEC_OBSVDATA
  - TM_GD970001

table-mappings:
  - name: obsvdata
    source: [IF_RSV_SEC_OBSVDATA]
    target: [PM_GD970201]
