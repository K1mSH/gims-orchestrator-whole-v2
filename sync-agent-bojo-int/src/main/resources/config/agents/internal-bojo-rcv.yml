# ── Internal RCV Agent ──
# DMZ에서 송신된 IF_SND 데이터를 내부망 IF_RSV(수신 인터페이스) 테이블에 적재한다.
# 파이프라인 흐름: IF_SND(source, Proxy 경유) → IF_RSV(target)
agent-code: internal-bojo-rcv
type: RCV

steps:
  - id: jewon-extract
    name: 제원 데이터 추출
    factory-key: source-to-if
    source-table: if_snd_sec_jewon
    target-table: if_rsv_sec_jewon
    primary-key: id
    conflict-key: source_refs
    full-copy: true

  - id: obsvdata-extract
    name: 관측데이터 추출
    factory-key: source-to-if
    source-table: if_snd_sec_obsvdata
    target-table: if_rsv_sec_obsvdata
    primary-key: id
    conflict-key: source_refs
    date-column: obsv_date
    time-column: obsv_time
