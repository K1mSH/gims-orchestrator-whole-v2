# ── DMZ SND (Send) Agent ──
# DMZ Target DB의 데이터를 IF_SND(송신 인터페이스) 테이블에 적재한다.
# 내부망으로 데이터를 보내기 위한 중간 단계.
# 파이프라인 흐름: Target DB(source) → IF_SND(target)
agent-code: dmz-bojo-snd
type: SND

# 제원(관측소 기본정보) 송신 설정
jewon:
  source-table: sec_jewon             # SELECT 대상 (DMZ Target DB)
  target-table: if_snd_sec_jewon      # INSERT/UPSERT 대상 (IF_SND 테이블)
  primary-key: id                     # source 테이블의 PK (SELECT 시 사용)
  conflict-key: source_refs           # UPSERT 충돌 판단 기준 (ON CONFLICT 키)
  full-copy: true                     # true: 매 실행마다 전체 복사 (증분 아님)

# 관측데이터 송신 설정
obsvdata:
  source-table: sec_obsvdata          # SELECT 대상 (DMZ Target DB)
  target-table: if_snd_sec_obsvdata   # INSERT/UPSERT 대상 (IF_SND 테이블)
  primary-key: id
  conflict-key: source_refs
  date-column: obsv_date              # 증분 추출 시 시간 비교에 사용하는 날짜 컬럼
  time-column: obsv_time              # 증분 추출 시 시간 비교에 사용하는 시각 컬럼

# 프론트엔드 "조건실행 > WHERE 조건"에서 사용자가 선택할 수 있는 테이블 목록.
# source-table/target-table 구분과 무관하게, 실제 조건 실행의 대상이 되는 테이블을 나열한다.
select-tables:
  - sec_jewon
  - sec_obsvdata

# 프론트엔드 모니터링/추적용 메타데이터. 실제 파이프라인 로직은 위의 source/target-table을 사용한다.
table-mappings:
  - name: jewon
    source: [sec_jewon]
    target: [if_snd_sec_jewon]
  - name: obsvdata
    source: [sec_obsvdata]
    target: [if_snd_sec_obsvdata]
