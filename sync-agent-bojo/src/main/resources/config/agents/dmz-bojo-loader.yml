# ── DMZ Loader Agent ──
# IF_RSV(인터페이스) 테이블에서 데이터를 읽어 DMZ Target DB에 적재한다.
# 파이프라인 흐름: IF_RSV(if-table) → Target DB(target-table)
agent-code: dmz-bojo-loader
type: LOADER

steps:
  - id: dmz-bojo-load
    name: DMZ 적재
    factory-key: dmz-bojo-load

select-tables:
  - if_rsv_sec_jewon
  - if_rsv_sec_obsvdata
  - sec_jewon

table-mappings:
  - name: jewon
    source: [if_rsv_sec_jewon]
    target: [sec_jewon]
  - name: obsvdata
    source: [if_rsv_sec_obsvdata]
    target: [sec_obsvdata]
